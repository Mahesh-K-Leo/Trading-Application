<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — KiteTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-bg">
        <div class="auth-grid"></div>
    </div>
    <div class="auth-container">
        <div class="auth-brand">
            <span class="logo-icon">◈</span>
            <span class="logo-text">KiteTrade</span>
            <p class="auth-tagline">Paper trade with real market data</p>
        </div>
        <div class="auth-card">
            <h2 class="auth-title">Sign In</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
              {% endfor %}
            {% endwith %}
            <form method="POST" action="/login">
                <div class="form-group">
                    <label class="form-label">Username or Email</label>
                    <input type="text" name="identifier" class="form-input" placeholder="Enter username or email" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login →</button>
            </form>
            <p class="auth-switch">Don't have an account? <a href="/register">Register</a></p>
        </div>
        <div class="auth-demo-note">
            <span>🔒 All trades use virtual money. No real funds involved.</span>
        </div>
    </div>
</body>
</html>
