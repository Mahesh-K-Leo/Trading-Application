<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — KiteTrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
    <div class="auth-bg">
        <div class="auth-grid"></div>
    </div>
    <div class="auth-container">
        <div class="auth-brand">
            <span class="logo-icon">◈</span>
            <span class="logo-text">KiteTrade</span>
            <p class="auth-tagline">Start with ₹10,00,000 virtual funds</p>
        </div>
        <div class="auth-card">
            <h2 class="auth-title">Create Account</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
              {% endfor %}
            {% endwith %}
            <form method="POST" action="/register">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="full_name" class="form-input" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Min 6 characters" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="/login">Login</a></p>
        </div>
        <div class="auth-demo-note">
            <span>🎯 Practice trading with NSE real-time data. Zero risk.</span>
        </div>
    </div>
</body>
</html>
