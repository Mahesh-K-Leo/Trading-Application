{% extends "base.html" %}
{% block title %}Market{% endblock %}
{% block page_title %}Market{% endblock %}
{% block content %}
<div class="page-body">
    <div class="two-col">
        <!-- Search -->
        <div class="panel panel-wide">
            <div class="panel-header">
                <span class="panel-title">Search NSE Stocks</span>
            </div>
            <div class="search-bar-wrap">
                <input type="text" id="searchInput" class="form-input search-input" placeholder="Search by symbol or company name..." oninput="searchStocks(this.value)">
            </div>
            <div id="searchResults" class="search-results"></div>

            <div class="panel-header" style="margin-top:2rem">
                <span class="panel-title">Top Stocks</span>
                <span class="text-xs text-muted">Auto-refreshes every 30s</span>
            </div>
            <div id="topStocks" class="search-results">
                <div class="loading-text">Loading market data...</div>
            </div>
        </div>

        <!-- Watchlist -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">My Watchlist</span>
            </div>
            <div id="watchlistPanel">
                <div class="loading-text">Loading...</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let searchTimeout;

function searchStocks(q) {
    clearTimeout(searchTimeout);
    if (!q.trim()) { document.getElementById('searchResults').innerHTML = ''; return; }
    searchTimeout = setTimeout(async () => {
        const res = await fetch(`/api/stock/search/${encodeURIComponent(q)}`);
        const data = await res.json();
        const el = document.getElementById('searchResults');
        if (!data.length) { el.innerHTML = '<div class="empty-row">No results found.</div>'; return; }
        el.innerHTML = data.map(s => `
            <div class="stock-row" onclick="loadStockDetail('${s.symbol}')">
                <div>
                    <div class="stock-name">${s.symbol}</div>
                    <div class="stock-sub">${s.company_name}</div>
                </div>
                <div class="stock-row-actions">
                    <button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();addWatchlist('${s.symbol}')">+ Watch</button>
                    <a href="/trade?symbol=${s.symbol}" class="btn btn-xs btn-primary" onclick="event.stopPropagation()">Trade</a>
                </div>
            </div>
        `).join('');
    }, 300);
}

async function loadTopStocks() {
    const res = await fetch('/api/market/overview');
    const stocks = await res.json();
    document.getElementById('topStocks').innerHTML = stocks.map(s => `
        <div class="stock-row" onclick="window.location='/chart?symbol=${s.symbol}'">
            <div>
                <div class="stock-name">${s.symbol}</div>
                <div class="stock-sub">${s.company_name}</div>
            </div>
            <div class="stock-price-block">
                <div class="price-val">${fmt(s.price)}</div>
                <div class="price-chg ${s.change_pct>=0?'text-green':'text-red'}">${s.change_pct>=0?'+':''}${(s.change_pct||0).toFixed(2)}%</div>
            </div>
            <div class="stock-row-actions">
                <button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();addWatchlist('${s.symbol}')">+ Watch</button>
                <a href="/trade?symbol=${s.symbol}" class="btn btn-xs btn-primary" onclick="event.stopPropagation()">Trade</a>
            </div>
        </div>
    `).join('');
}

async function loadWatchlist() {
    const res = await fetch('/api/watchlist');
    const data = await res.json();
    const el = document.getElementById('watchlistPanel');
    if (!data.length) {
        el.innerHTML = '<div class="empty-row">Search stocks and add to watchlist.</div>';
        return;
    }
    el.innerHTML = data.map(w => `
        <div class="stock-row">
            <div>
                <div class="stock-name">${w.symbol}</div>
                <div class="stock-sub">${w.company_name}</div>
            </div>
            <div class="stock-price-block">
                <div class="price-val">${fmt(w.price)}</div>
                <div class="price-chg ${w.change_pct>=0?'text-green':'text-red'}">${w.change_pct>=0?'+':''}${(w.change_pct||0).toFixed(2)}%</div>
            </div>
            <div class="stock-row-actions">
                <a href="/chart?symbol=${w.symbol}" class="btn btn-xs btn-ghost">Chart</a>
                <a href="/trade?symbol=${w.symbol}" class="btn btn-xs btn-primary">Trade</a>
                <button class="btn btn-xs btn-danger-ghost" onclick="removeWatchlist('${w.symbol}')">✕</button>
            </div>
        </div>
    `).join('');
}

async function addWatchlist(symbol) {
    await fetch('/api/watchlist/add', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({symbol})});
    showToast(`${symbol} added to watchlist`, 'success');
    loadWatchlist();
}

async function removeWatchlist(symbol) {
    await fetch(`/api/watchlist/remove/${symbol}`, {method:'DELETE'});
    showToast(`${symbol} removed`, 'info');
    loadWatchlist();
}

loadTopStocks();
loadWatchlist();
setInterval(() => { loadTopStocks(); loadWatchlist(); }, 30000);
</script>
{% endblock %}
